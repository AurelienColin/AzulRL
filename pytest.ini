[pytest]
# Pytest configuration for AzulRL unit tests

testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output settings
addopts =
    -v
    --tb=short
    -ra
    --strict-markers

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:tensorflow.*

# Minimum coverage threshold (requires pytest-cov)
# Run with: pytest --cov=src --cov-report=term-missing
